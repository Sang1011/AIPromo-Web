<!DOCTYPE html>
<html class="dark" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#7c3bed",
            "background-light": "#f7f6f8",
            "background-dark": "#0B0B12",
            "card-dark": "#18122B",
          },
          fontFamily: {
            "display": ["Spline Sans", "Noto Sans", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">.glass-card {
    background: rgba(24, 18, 43, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(124, 59, 237, 0.3)
    }
.neon-focus:focus {
    box-shadow: 0 0 15px rgba(124, 59, 237, 0.4);
    border-color: #7c3bed;
    outline: none
    }
.bg-neural-network {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCehD_mw9VOzMzz9enX2A9VgYuRJqidjb5czWc3HCfHpIT78npEgec_Wkr9oKkIAjvjvziNXIVBiEv5qO93x2X1DutOSdMk3xR8EsxoeBcEv102BI4QTwBvZlKmDXvanfq7QqbXmT9xFS_qGt9UbbxdF9XLZ7AMEb0vAU4YpIltOgMnaIUs8XLg6ahk2z6eLOhbM4Dg-yW8wmBkyTCG37MtRP3zGTGwtnmg2AFeprJ537RaKn34B22Rz-tgHjJp2K6AyhcVqFYITbXc);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat
    }
.neural-overlay {
    background: radial-gradient(circle at center, rgba(11, 11, 18, 0.4) 0%, rgba(11, 11, 18, 0.9) 100%)
    }</style>
</head>

<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col relative overflow-x-hidden">
  <div class="fixed inset-0 bg-neural-network z-0"></div>
  <div class="fixed inset-0 neural-overlay z-1"></div>
  <div class="relative flex min-h-screen w-full flex-col z-10">
    <header
      class="flex items-center justify-between px-6 py-4 md:px-10 lg:px-40 border-b border-primary/10 bg-background-dark/30 backdrop-blur-md sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="text-primary">
          <svg class="w-8 h-8" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path clip-rule="evenodd"
              d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z"
              fill="currentColor" fill-rule="evenodd"></path>
          </svg>
        </div>
        <h2 class="text-xl font-bold tracking-tight">AIPromo</h2>
      </div>
      <div class="flex items-center gap-4">
        <span class="hidden sm:inline text-sm text-slate-300">Chưa có tài khoản?</span>
        <button
          class="bg-primary hover:bg-primary/90 text-white text-sm font-bold py-2 px-6 rounded-lg transition-all shadow-lg shadow-primary/20">
          Đăng ký
        </button>
      </div>
    </header>
    <main class="flex-1 flex items-center justify-center p-6 relative">
      <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/20 rounded-full blur-[140px] pointer-events-none">
      </div>
      <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-blue-600/10 rounded-full blur-[140px] pointer-events-none">
      </div>
      <div class="glass-card w-full max-w-md p-8 rounded-xl shadow-2xl z-20">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold mb-2">Chào mừng trở lại</h1>
          <p class="text-slate-300">Đăng nhập để quản lý sự kiện của bạn</p>
        </div>
        <div class="mb-6">
          <button
            class="w-full flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 border border-white/20 rounded-lg h-12 transition-all group">
            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"></path>
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"></path>
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"></path>
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                fill="#EA4335"></path>
            </svg>
            <span class="font-medium">Tiếp tục với Google</span>
          </button>
        </div>
        <div class="relative flex items-center mb-6">
          <div class="flex-grow border-t border-white/20"></div>
          <span class="flex-shrink mx-4 text-xs uppercase tracking-widest text-slate-400">Hoặc sử dụng email</span>
          <div class="flex-grow border-t border-white/20"></div>
        </div>
        <form class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-200 mb-1.5" for="email">Địa chỉ Email</label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
              <input
                class="w-full bg-white/5 border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-white placeholder:text-slate-500 neon-focus transition-all"
                id="email" placeholder="example@aipromo.vn" type="email" />
            </div>
          </div>
          <div>
            <div class="flex justify-between mb-1.5">
              <label class="block text-sm font-medium text-slate-200" for="password">Mật khẩu</label>
              <a class="text-xs text-primary hover:text-primary/80 transition-colors font-medium" href="#">Quên mật
                khẩu?</a>
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
              <input
                class="w-full bg-white/5 border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-white placeholder:text-slate-500 neon-focus transition-all"
                id="password" placeholder="••••••••" type="password" />
            </div>
          </div>
          <div class="flex items-center">
            <input
              class="w-4 h-4 rounded border-white/20 bg-white/5 text-primary focus:ring-primary focus:ring-offset-background-dark"
              id="remember" type="checkbox" />
            <label class="ml-2 text-sm text-slate-300" for="remember">Ghi nhớ đăng nhập</label>
          </div>
          <button
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2"
            type="submit">
            Đăng nhập
            <span class="material-symbols-outlined text-base font-bold">arrow_forward</span>
          </button>
        </form>
        <div class="mt-8 pt-6 border-t border-white/10 text-center">
          <p class="text-sm text-slate-400">
            Bằng cách đăng nhập, bạn đồng ý với <a
              class="text-slate-200 hover:text-primary transition-colors border-b border-white/20" href="#">Điều khoản
              dịch vụ</a> và <a class="text-slate-200 hover:text-primary transition-colors border-b border-white/20"
              href="#">Chính sách bảo mật</a> của chúng tôi.
          </p>
        </div>
      </div>
    </main>
    <footer class="py-6 px-10 text-center text-slate-400 text-xs backdrop-blur-sm bg-background-dark/20">
      <p>© 2024 AIPromo Event Platform. Mọi quyền được bảo lưu.</p>
    </footer>
  </div>

</body>

</html>
