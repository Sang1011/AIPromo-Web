<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký AIPromo</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#793bed",
            darkbg: "#0B0B12",
          },
          fontFamily: {
            display: ["Spline Sans", "sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Spline Sans', sans-serif; }

    .glass-card {
      background: rgba(24, 18, 43, 0.75);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(121, 59, 237, 0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }

    .neon-glow:focus-within {
      box-shadow: 0 0 15px rgba(121, 59, 237, 0.45);
      border-color: #793bed;
    }

    .primary-glow:hover {
      box-shadow: 0 0 30px rgba(121, 59, 237, 0.8);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- ============ VIDEO BACKGROUND ============ -->
  <div class="fixed inset-0 -z-30 overflow-hidden">
    <iframe
      class="absolute top-1/2 left-1/2 w-[177.77777778vh] h-[56.25vw] min-w-full min-h-full 
             -translate-x-1/2 -translate-y-1/2"
      src="https://www.youtube.com/embed/VRnaVqZfrAE?autoplay=1&mute=1&loop=1&playlist=VRnaVqZfrAE&controls=0&rel=0&playsinline=1"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Overlay -->
  <div class="fixed inset-0 bg-black/65 -z-20"></div>

  <!-- ============ FORM ============ -->
  <div class="w-full max-w-[460px] z-10 p-4">
    <div class="glass-card rounded-xl p-7 flex flex-col gap-6">

      <div class="text-center text-white">
        <h1 class="text-3xl font-bold font-display">AIPromo</h1>
        <p class="text-white/60 text-sm mt-1">Tạo tài khoản để bắt đầu</p>
      </div>

      <button class="h-12 rounded-lg bg-white/10 hover:bg-white/20 border border-white/10 text-white flex items-center justify-center gap-3">
        <img class="w-5 h-5" src="https://www.google.com/favicon.ico">
        Đăng ký với Google
      </button>

      <div class="flex items-center gap-4">
        <div class="h-px bg-white/10 flex-1"></div>
        <span class="text-white/50 text-sm">Hoặc</span>
        <div class="h-px bg-white/10 flex-1"></div>
      </div>

      <form class="flex flex-col gap-4">

        <div>
          <label class="text-white text-sm">Họ và tên</label>
          <div class="neon-glow border border-white/10 rounded-lg bg-white/5">
            <input required class="w-full bg-transparent text-white px-4 py-3 border-none focus:ring-0"
              placeholder="Nguyễn Văn A">
          </div>
        </div>

        <div>
          <label class="text-white text-sm">Email</label>
          <div class="neon-glow border border-white/10 rounded-lg bg-white/5">
            <input type="email" required class="w-full bg-transparent text-white px-4 py-3 border-none focus:ring-0"
              placeholder="example@email.com">
          </div>
        </div>

        <div>
          <label class="text-white text-sm">Mật khẩu</label>
          <div class="relative neon-glow border border-white/10 rounded-lg bg-white/5">
            <input id="password" type="password" required minlength="8"
              class="w-full bg-transparent text-white px-4 py-3 border-none focus:ring-0"
              placeholder="Tối thiểu 8 ký tự">
            <span onclick="toggle('password')" class="material-symbols-outlined absolute right-3 top-3 text-white/50 cursor-pointer">
              visibility
            </span>
          </div>
        </div>

        <div>
          <label class="text-white text-sm">Xác nhận mật khẩu</label>
          <div class="relative neon-glow border border-white/10 rounded-lg bg-white/5">
            <input id="confirm" type="password" required
              class="w-full bg-transparent text-white px-4 py-3 border-none focus:ring-0"
              placeholder="Nhập lại mật khẩu">
            <span onclick="toggle('confirm')" class="material-symbols-outlined absolute right-3 top-3 text-white/50 cursor-pointer">
              visibility
            </span>
          </div>
        </div>

        <label class="flex items-center gap-2 text-sm text-white/70">
          <input type="checkbox" required class="rounded bg-white/10 border-white/20">
          Tôi đồng ý với <span class="text-primary underline cursor-pointer">Điều khoản sử dụng</span>
        </label>

        <button type="submit"
          class="primary-glow h-14 rounded-lg bg-primary text-white text-lg font-bold mt-2">
          Tạo tài khoản
        </button>
      </form>

      <p class="text-center text-white/60 text-sm">
        Đã có tài khoản?
        <a href="#" class="text-primary font-bold hover:underline">Đăng nhập</a>
      </p>

    </div>
  </div>

<script>
  function toggle(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
